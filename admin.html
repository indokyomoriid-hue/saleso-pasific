<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Saleso Pacific</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #004d40;
            --secondary: #2196F3;
            --danger: #f44336;
            --light: #f4f4f4;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); padding: 20px; color: #333; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .config-section { background: #fff3cd; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ffeeba; }
        h2 { color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        h4 { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #00332c; }
        .btn-load { background: var(--secondary); color: white; }
        .btn-load:hover { background: #1976D2; }
        
        #add-form { background: #f9f9f9; border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .product-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid #eee; background: #fff;
            transition: 0.2s;
        }
        .product-item:hover { background: #fdfdfd; }
        .product-info-text { font-size: 14px; line-height: 1.6; }
        .code-badge { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; color: #555; }
        .btn-delete { color: var(--danger); cursor: pointer; font-size: 18px; padding: 5px; }
        
        hr { margin: 30px 0; border: 0; border-top: 1px solid #eee; }
        .loading-overlay { display: none; color: var(--secondary); font-weight: bold; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2><i class="fa-solid fa-user-shield"></i> Saleso Pacific Admin Panel</h2>
    
    <div class="config-section">
        <h4><i class="fa-solid fa-gear"></i> 1. Koneksi GitHub</h4>
        <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (PAT)">
        <div class="form-grid">
            <input type="text" id="ghUser" placeholder="Username GitHub (samuelandiwinata)">
            <input type="text" id="ghRepo" placeholder="Nama Repo (saleso-pacific)">
        </div>
        <button class="btn btn-load" onclick="fetchFromGitHub()">
            <i class="fa-solid fa-sync"></i> Ambil Data Terbaru
        </button>
        <div id="loading" class="loading-overlay">Memproses data... mohon tunggu...</div>
    </div>

    <div id="add-form" style="display:none;">
        <h4><i class="fa-solid fa-plus-circle"></i> 2. Tambah Produk Baru</h4>
        <div class="form-grid">
            <div>
                <label>Item Code (Wajib)</label>
                <input type="text" id="pCode" placeholder="Contoh: iebdoebbeej">
            </div>
            <div>
                <label>Brand</label>
                <input type="text" id="pBrand" placeholder="Contoh: Kyomori / Marukyu">
            </div>
        </div>
        
        <label>Nama Produk</label>
        <input type="text" id="pName" placeholder="Contoh: Gyokuho Matcha 100g">
        
        <div class="form-grid">
            <div>
                <label>Harga (RM)</label>
                <input type="number" step="0.01" id="pPrice" placeholder="0.00">
            </div>
            <div>
                <label>Kategori</label>
                <select id="pCat">
                    <option value="Matcha">Matcha</option>
                    <option value="Syrup">Syrup</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Coffee">Coffee</option>
                    <option value="Frozen">Frozen</option>
                </select>
            </div>
        </div>

        <label>URL Gambar Produk</label>
        <input type="text" id="pImage" placeholder="https://domain.com/gambar.jpg">
        
        <button class="btn btn-save" onclick="addProductLocal()" style="width: 100%; margin-top: 10px;">
            <i class="fa-solid fa-plus"></i> Tambah ke List Sementara
        </button>
    </div>

    <div id="product-list-admin">
        <p style="text-align: center; color: #888;">Silahkan masukkan konfigurasi dan tarik data...</p>
    </div>

    <hr>
    <button id="final-save" class="btn btn-save" style="display:none; width: 100%; background: #2e7d32; font-size: 16px;" onclick="pushToGitHub()">
        <i class="fa-solid fa-cloud-arrow-up"></i> 3. SIMPAN PERUBAHAN KE GITHUB (LIVE)
    </button>
</div>

<script>
    let currentData = [];
    let fileSha = ""; 

    async function fetchFromGitHub() {
        const user = document.getElementById('ghUser').value;
        const repo = document.getElementById('ghRepo').value;
        const token = document.getElementById('ghToken').value;
        const loader = document.getElementById('loading');

        if(!token || !user || !repo) return alert("Harap isi Token, Username, dan Repo!");

        loader.style.display = "block";
        const url = `https://api.github.com/repos/${user}/${repo}/contents/products.json`;
        
        try {
            const response = await fetch(url, {
                headers: { "Authorization": `token ${token}` }
            });
            const data = await response.json();
            
            if(data.message === "Not Found") throw new Error("File products.json tidak ditemukan!");

            fileSha = data.sha;
            const content = JSON.parse(decodeURIComponent(escape(atob(data.content)))); 
            currentData = content.products || [];
            
            renderAdminProducts();
            document.getElementById('add-form').style.display = "block";
            document.getElementById('final-save').style.display = "block";
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            loader.style.display = "none";
        }
    }

    function renderAdminProducts() {
        const container = document.getElementById('product-list-admin');
        container.innerHTML = `<h4>Daftar Produk (${currentData.length})</h4>`;
        
        if(currentData.length === 0) {
            container.innerHTML += "<p>Belum ada produk di database.</p>";
            return;
        }

        currentData.forEach((p, index) => {
            container.innerHTML += `
                <div class="product-item">
                    <div class="product-info-text">
                        <span class="code-badge">${p.code || 'NO-CODE'}</span> 
                        <strong>[${p.brand}]</strong> ${p.name} <br>
                        <small style="color:#2e7d32; font-weight:bold;">RM ${parseFloat(p.price).toFixed(2)}</small> | 
                        <small style="color:#888;">Cat: ${p.category}</small>
                    </div>
                    <i class="fa-solid fa-trash btn-delete" onclick="deleteProduct(${index})" title="Hapus Produk"></i>
                </div>
            `;
        });
    }

    function addProductLocal() {
        const codeInput = document.getElementById('pCode').value.trim();
        const nameInput = document.getElementById('pName').value.trim();
        const priceInput = document.getElementById('pPrice').value;

        if(!codeInput || !nameInput || !priceInput) {
            return alert("Item Code, Nama Produk, dan Harga wajib diisi!");
        }

        const p = {
            id: Date.now(),
            code: codeInput,
            brand: document.getElementById('pBrand').value || "SALESO",
            name: nameInput,
            price: parseFloat(priceInput),
            category: document.getElementById('pCat').value,
            image: document.getElementById('pImage').value || "https://placehold.co/400"
        };

        currentData.unshift(p); // Tambah ke urutan paling atas
        renderAdminProducts();

        // Reset form input saja (kecuali brand/cat untuk mempercepat input berikutnya)
        document.getElementById('pCode').value = "";
        document.getElementById('pName').value = "";
        document.getElementById('pPrice').value = "";
    }

    function deleteProduct(index) {
        if(confirm("Hapus produk ini dari daftar?")) {
            currentData.splice(index, 1);
            renderAdminProducts();
        }
    }

    async function pushToGitHub() {
        const user = document.getElementById('ghUser').value;
        const repo = document.getElementById('ghRepo').value;
        const token = document.getElementById('ghToken').value;

        if(!confirm("Anda akan memperbarui file products.json secara live. Lanjutkan?")) return;

        const url = `https://api.github.com/repos/${user}/${repo}/contents/products.json`;
        const newJsonContent = JSON.stringify({ products: currentData }, null, 2);
        
        const body = {
            message: "Update inventory via Admin Panel: " + new Date().toLocaleString(),
            content: btoa(unescape(encodeURIComponent(newJsonContent))),
            sha: fileSha
        };

        try {
            const response = await fetch(url, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            if(response.ok) {
                alert("BERHASIL! Data telah dikirim ke GitHub.\n\nTunggu sekitar 1-2 menit hingga website sinkron.");
                location.reload();
            } else {
                const err = await response.json();
                alert("Gagal menyimpan: " + err.message);
            }
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
</script>

</body>
</html>
