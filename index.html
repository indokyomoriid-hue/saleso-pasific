<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleso Pacific | B2B F&B Supplier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #004d40; 
            --accent-color: #ffc107;  
            --bg-light: #f5f5f5;
            --text-dark: #333;
            --white: #ffffff;
            --price-color: #e65100;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }

        /* HEADER */
        header { background-color: var(--primary-color); color: var(--white); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
        .nav-content { display: flex; align-items: center; gap: 40px; justify-content: space-between; }
        .logo { font-size: 26px; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--accent-color); }
        
        .search-box { flex-grow: 1; display: flex; background: var(--white); border-radius: 4px; padding: 2px; max-width: 600px;}
        .search-box input { flex-grow: 1; border: none; padding: 10px; outline: none; }
        .search-box button { background: var(--primary-color); color: white; border: none; padding: 0 20px; cursor: pointer; border-radius: 2px; }
        
        .cart-wrapper { position: relative; cursor: pointer; font-size: 24px; }
        .cart-badge { position: absolute; top: -10px; right: -12px; background: var(--accent-color); color: var(--primary-color); font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 50%; }

        /* PRODUCT GRID */
        .section-title { font-size: 18px; font-weight: 600; margin: 30px 0 15px; text-transform: uppercase; color: #666; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        
        .product-card { background: var(--white); border-radius: 4px; border: 1px solid #eee; overflow: hidden; transition: 0.2s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: var(--primary-color); }
        
        .product-img { width: 100%; height: 180px; object-fit: cover; background: #f9f9f9; }
        .product-info { padding: 12px; flex-grow: 1; }
        .brand-tag { font-size: 10px; color: var(--primary-color); font-weight: bold; text-transform: uppercase; }
        .product-name { font-size: 14px; margin: 5px 0; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { color: var(--price-color); font-weight: 700; font-size: 16px; margin-bottom: 10px; }
        
        .btn-add { width: 100%; background: var(--primary-color); color: white; border: none; padding: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add:hover { background: #00332a; }

        /* MODAL GLASSMORPHISM */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: rgba(255, 255, 255, 0.9); width: 100%; max-width: 450px; border-radius: 12px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        .btn-wa { width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        @media (max-width: 600px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="container nav-content">
            <div class="logo">SALESO<span>PACIFIC</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari 700+ produk..." onkeyup="filterProducts()">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="cart-wrapper" onclick="toggleModal()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Katalog Produk F&B</h2>
        <div class="product-grid" id="product-list">
            </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Konfirmasi Pesanan</h3>
                <i class="fa-solid fa-xmark" style="cursor:pointer" onclick="toggleModal()"></i>
            </div>
            <div id="cart-summary" style="margin-bottom: 20px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px;"></div>
            
            <form onsubmit="sendToWA(event)">
                <div class="form-group">
                    <label>Nama Bisnis / Toko</label>
                    <input type="text" id="bizName" required placeholder="Contoh: Cafe Saleso">
                </div>
                <div class="form-group">
                    <label>Alamat Lengkap</label>
                    <textarea id="bizAddress" rows="3" required placeholder="Alamat pengiriman..."></textarea>
                </div>
                <button type="submit" class="btn-wa"><i class="fa-brands fa-whatsapp"></i> Kirim Pesanan ke WhatsApp</button>
            </form>
        </div>
    </div>

    <script>
        let allProducts = [];
        let cart = {};

        // 1. Ambil Data dari JSON
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                allProducts = data.products;
                displayProducts(allProducts);
            } catch (error) {
                console.error("Gagal memuat JSON:", error);
                document.getElementById('product-list').innerHTML = "<p>Gagal memuat data produk.</p>";
            }
        }

        // 2. Render Produk ke Grid
        function displayProducts(products) {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" class="product-img" alt="${p.name}" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                    <div class="product-info">
                        <span class="brand-tag">${p.brand}</span>
                        <h4 class="product-name">${p.name}</h4>
                        <p class="price">RM ${p.price.toFixed(2)}</p>
                    </div>
                    <button class="btn-add" onclick="addToCart('${p.name}', ${p.price})">Tambah</button>
                </div>
            `).join('');
        }

        // 3. Pencarian Produk
        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.brand.toLowerCase().includes(query)
            );
            displayProducts(filtered);
        }

        // 4. Sistem Keranjang
        function addToCart(name, price) {
            if(cart[name]) {
                cart[name].qty += 1;
            } else {
                cart[name] = { price, qty: 1 };
            }
            updateBadge();
        }

        function updateBadge() {
            const total = Object.values(cart).reduce((acc, curr) => acc + curr.qty, 0);
            document.getElementById('cart-count').innerText = total;
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            const summary = document.getElementById('cart-summary');
            
            if(Object.keys(cart).length === 0) {
                alert("Keranjang kosong!");
                return;
            }

            let html = "<strong>Pesanan Anda:</strong><br>";
            for (let item in cart) {
                html += `- ${cart[item].qty}x ${item}<br>`;
            }
            summary.innerHTML = html;
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // 5. Kirim ke WhatsApp
        function sendToWA(e) {
            e.preventDefault();
            const name = document.getElementById('bizName').value;
            const addr = document.getElementById('bizAddress').value;
            const waNumber = "601115008803";

            let message = `Halo Saleso Pacific, saya ingin memesan:\n\n`;
            message += `*Bisnis:* ${name}\n`;
            message += `*Alamat:* ${addr}\n\n`;
            message += `*Daftar Produk:*\n`;

            for (let item in cart) {
                message += `- ${cart[item].qty}x ${item}\n`;
            }

            const url = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        // Jalankan saat halaman dimuat
        loadProducts();
    </script>
</body>
</html>
