<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleso Pacific | B2B F&B Supplier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4a017;
            --accent-color: #1a1a1a;
            --bg-light: #f9f9f9;
            --text-dark: #2d2d2d;
            --white: #ffffff;
            --price-color: #b8860b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 90px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px;
        }
        .lang-bar {
            background: #d4a017;
            padding: 6px 0;
            text-align: right;
        }
        .lang-btn {
            background: none;
            border: none;
            color: #fff;
            opacity: 0.8;
            cursor: pointer;
            font-size: 12.5px;
            margin-left: 16px;
            font-weight: 600;
        }
        .lang-btn.active {
            opacity: 1;
            color: var(--accent-color);
            font-weight: 700;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo img {
            height: 42px;
            width: auto;
        }
        .logo-text {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .cart-wrapper {
            position: relative;
            font-size: 26px;
            padding: 8px;
            cursor: pointer;
        }
        .cart-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--accent-color);
            color: var(--primary-color);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 50%;
            min-width: 18px;
            text-align: center;
        }

        /* ===== NOTIFICATION ===== */
        .notif-wrapper {
            position: static;
        }
        .notif-btn {
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            padding: 8px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }
        .notif-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--accent-color);
            color: var(--primary-color);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
            min-width: 18px;
            text-align: center;
            display: none;
        }
        /* Mobile: full width di bawah header */
        .notif-panel {
            display: none;
            position: fixed;
            top: auto;
            left: 0;
            right: 0;
            width: 100%;
            background: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.18);
            z-index: 2000;
            max-height: 70vh;
            overflow-y: auto;
        }
        /* Desktop: panel kecil di kanan */
        @media (min-width: 600px) {
            .notif-wrapper {
                position: relative;
            }
            .notif-panel {
                position: absolute;
                top: calc(100% + 10px);
                left: auto;
                right: 0;
                width: 340px;
                border-radius: 14px;
                max-height: 420px;
            }
        }
        .notif-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }
        .notif-panel-header span {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }
        .notif-markall {
            font-size: 12px;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 600;
            background: none;
            border: none;
            padding: 0;
        }
        .notif-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s;
        }
        .notif-item.unread {
            background: #fff9e6;
        }
        .notif-item:hover {
            background: #f5f5f5;
        }
        .notif-item.unread:hover {
            background: #fff3cc;
        }
        .notif-item-inner {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary-color);
            flex-shrink: 0;
            margin-top: 5px;
            transition: opacity 0.2s;
        }
        .notif-item:not(.unread) .notif-dot {
            opacity: 0;
        }
        .notif-title {
            font-size: 13px;
            font-weight: 600;
            color: #222;
            margin-bottom: 3px;
        }
        .notif-body {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }
        .notif-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
        }
        .notif-empty {
            text-align: center;
            color: #aaa;
            padding: 30px 16px;
            font-size: 13px;
        }
        .notif-empty i {
            display: block;
            font-size: 32px;
            margin-bottom: 10px;
            color: #ddd;
        }

        .search-box {
            display: flex;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            min-height: 52px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
        }
        .search-box button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 22px;
            cursor: pointer;
            font-size: 20px;
        }
        .section-white {
            background: white;
            margin-top: 12px;
            padding: 16px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section-title {
            font-size: 14px;
            color: #555;
            margin-bottom: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .cat-item {
            background: white;
            padding: 14px 8px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid #eee;
            transition: 0.2s;
            cursor: pointer;
            user-select: none;
        }
        .cat-item:hover {
            border-color: var(--primary-color);
        }
        .cat-item i {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 6px;
        }
        .cat-item p {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }
        .cat-item.active {
            background: #fff9e6;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: box-shadow 0.25s, border-color 0.25s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f5f5f5;
            background-image: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .product-img.loaded {
            animation: none;
            background-image: none;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .product-info {
            padding: 12px;
            flex: 1;
        }
        .brand-tag {
            font-size: 10px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .product-name {
            font-size: 13.8px;
            font-weight: 600;
            line-height: 1.35;
            height: 38px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin: 6px 0 8px;
        }
        .price {
            color: var(--price-color);
            font-weight: 700;
            font-size: 15.5px;
            margin-bottom: 10px;
        }
        .btn-add {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: auto;
        }
        .btn-add:hover:not(:disabled) {
            background: #b8860b;
        }
        .btn-add:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ===== RESULTS BAR ===== */
        .results-bar {
            display: flex;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 4px;
        }

        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #333;
        }
        .page-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .page-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-ellipsis {
            font-size: 14px;
            color: #999;
            padding: 0 4px;
            line-height: 36px;
        }

        /* ===== FLOATING CART ===== */
        .floating-cart {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-color);
            color: var(--primary-color);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14.5px;
            cursor: pointer;
            border: none;
        }
        .float-badge {
            background: var(--primary-color);
            color: white;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* ===== PRODUCT DETAIL POPUP ===== */
        .product-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 4000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .product-modal-content {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            z-index: 4100;
            border: none;
        }
        .modal-image {
            width: 100%;
            height: 340px;
            object-fit: contain;
            background: #f9f9f9;
        }
        .modal-info {
            padding: 20px;
        }
        .modal-brand {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .modal-name {
            font-size: 18px;
            font-weight: 600;
            margin: 8px 0 12px;
            line-height: 1.3;
        }
        .modal-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--price-color);
            margin-bottom: 20px;
        }

        /* ===== CART MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-wa {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        /* ===== SKELETON LOADING ===== */
        .skeleton-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .skeleton-img {
            width: 100%;
            height: 200px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-text {
            padding: 12px;
        }
        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            margin-bottom: 10px;
        }
        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.long { width: 90%; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #ddd;
            display: block;
        }
        .empty-state p {
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="lang-bar">
        <div class="container">
            <button class="lang-btn active" onclick="setLanguage('en', this)">English</button>
            <button class="lang-btn" onclick="setLanguage('ms', this)">Melayu</button>
            <button class="lang-btn" onclick="setLanguage('zh', this)">中文</button>
        </div>
    </div>

    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <img src="SalesoLogo.png" alt="Saleso Pacific Logo">
                    <div class="logo-text">SALESO PACIFIC SDN BHD</div>
                </div>
                <div class="header-actions">
                    <!-- Notification Button -->
                    <div class="notif-wrapper" id="notifWrapper">
                        <button class="notif-btn" onclick="toggleNotifPanel()" aria-label="Notifications">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notif-badge" id="notif-badge"></span>
                        </button>
                        <div class="notif-panel" id="notifPanel">
                            <div class="notif-panel-header">
                                <span id="txt-notif-title">Notifications</span>
                                <button class="notif-markall" onclick="markAllRead()" id="txt-notif-markall">Mark all as read</button>
                            </div>
                            <div id="notif-list"></div>
                        </div>
                    </div>
                    <!-- Cart Button -->
                    <div class="cart-wrapper" onclick="toggleModal()">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </div>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search from 700+ F&B ingredients...">
                <button onclick="triggerSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="section-white">
            <div class="section-title" id="txt-cat-title">Main Category</div>
            <div class="category-grid">
                <div class="cat-item active" onclick="filterByCategory('All', this)">
                    <i class="fa-solid fa-border-all"></i>
                    <p id="cat-all">All</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Matcha', this)">
                    <i class="fa-solid fa-leaf"></i>
                    <p id="cat-matcha">Matcha</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Beverage', this)">
                    <i class="fa-solid fa-glass-water"></i>
                    <p id="cat-beverage">Beverage</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Syrup', this)">
                    <i class="fa-solid fa-bottle-droplet"></i>
                    <p id="cat-syrup">Syrup</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Sauce', this)">
                    <i class="fa-solid fa-fill-drip"></i>
                    <p id="cat-sauce">Sauce</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Dairy', this)">
                    <i class="fa-solid fa-cow"></i>
                    <p id="cat-dairy">Dairy</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Food', this)">
                    <i class="fa-solid fa-utensils"></i>
                    <p id="cat-food">Food</p>
                </div>
            </div>
        </section>

        <div class="results-bar">
            <h2 class="section-title" id="txt-catalog-title" style="margin:0;">Product Catalog</h2>
        </div>

        <div class="product-grid" id="product-list"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <!-- Floating Cart -->
    <button class="floating-cart" id="floatingCart" onclick="toggleModal()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="txt-float-cart">View Cart</span>
        <span class="float-badge" id="float-count">0</span>
    </button>

    <!-- Product Detail Popup -->
    <div class="product-modal" id="productModal">
        <div class="product-modal-content">
            <button class="modal-close" onclick="closeProductModal()">×</button>
            <div id="modalProductContent"></div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="txt-modal-title">Order Summary</h3>
                <i class="fa-solid fa-xmark" style="font-size:26px; cursor:pointer; color:#888;" onclick="toggleModal()"></i>
            </div>
            <div id="cart-summary" style="margin-bottom: 25px; max-height: 320px; overflow-y: auto;"></div>
            <form onsubmit="sendToWA(event)">
                <div class="form-group">
                    <label id="lbl-biz-name">Business Name / Shop</label>
                    <input type="text" id="bizName" required>
                </div>
                <div class="form-group">
                    <label id="lbl-biz-addr">Delivery Address</label>
                    <textarea id="bizAddress" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-wa">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span id="txt-btn-send">Send via WhatsApp</span>
                </button>
            </form>
        </div>
    </div>

    <script>
    // =============================================
    //  TRANSLATIONS
    // =============================================
    const translations = {
        en: {
            searchPlaceholder: "Search from 700+ F&B ingredients...",
            catTitle: "Main Category",
            catAll: "All", catMatcha: "Matcha", catSyrup: "Syrup",
            catSauce: "Sauce", catDairy: "Dairy", catFood: "Food", catBeverage: "Beverage",
            catalogTitle: "Product Catalog",
            btnAdd: "Add to Cart", floatCart: "View Cart",
            modalTitle: "Order Summary", lblBizName: "Business Name / Shop",
            lblBizAddr: "Delivery Address", btnSend: "Send via WhatsApp",
            emptyCart: "Your cart is empty.", estTotal: "Total Estimate",
            waHeader: "Hello Saleso Pacific, I would like to order:",
            waBiz: "Business", waAddr: "Address", waList: "Order List",
            noProducts: "No products found.",
            notifTitle: "Notifications", notifMarkAll: "Mark all as read",
            notifEmpty: "No notifications yet."
        },
        ms: {
            searchPlaceholder: "Cari dari 700+ bahan F&B...",
            catTitle: "Kategori Utama",
            catAll: "Semua", catMatcha: "Matcha", catSyrup: "Sirap",
            catSauce: "Sos", catDairy: "Tenusu", catFood: "Makanan", catBeverage: "Minuman",
            catalogTitle: "Katalog Produk",
            btnAdd: "Tambah ke Bakul", floatCart: "Lihat Bakul",
            modalTitle: "Ringkasan Pesanan", lblBizName: "Nama Bisnes / Kedai",
            lblBizAddr: "Alamat Penghantaran", btnSend: "Hantar melalui WhatsApp",
            emptyCart: "Bakul anda kosong.", estTotal: "Anggaran Total",
            waHeader: "Helo Saleso Pacific, saya ingin memesan:",
            waBiz: "Bisnes", waAddr: "Alamat", waList: "Senarai Pesanan",
            noProducts: "Tiada produk ditemui.",
            notifTitle: "Pemberitahuan", notifMarkAll: "Tandai semua dibaca",
            notifEmpty: "Tiada pemberitahuan."
        },
        zh: {
            searchPlaceholder: "搜索 700+ 餐饮原料...",
            catTitle: "主要类别",
            catAll: "全部商品", catMatcha: "抹茶", catSyrup: "糖浆",
            catSauce: "酱料", catDairy: "乳制品", catFood: "食品", catBeverage: "饮料",
            catalogTitle: "产品目录",
            btnAdd: "加入购物车", floatCart: "查看购物车",
            modalTitle: "订单摘要", lblBizName: "店铺/公司名称",
            lblBizAddr: "送货地址", btnSend: "通过 WhatsApp 发送",
            emptyCart: "购物车是空的。", estTotal: "预估总额",
            waHeader: "您好 Saleso Pacific，我想订购以下商品：",
            waBiz: "商家名称", waAddr: "地址", waList: "订单详情",
            noProducts: "未找到产品。",
            notifTitle: "通知", notifMarkAll: "全部标为已读",
            notifEmpty: "暂无通知。"
        }
    };

    // =============================================
    //  STATE
    // =============================================
    let currentLang          = 'en';
    let allProducts          = [];
    let currentProducts      = [];
    let cart                 = {};
    let currentViewedProduct = null;
    let notifications        = [];
    let isInitialLoad        = true; // FIX 1: flag untuk cegah auto-scroll pertama

    const PAGE_SIZE = 20;
    let currentPage = 1;

    // =============================================
    //  LANGUAGE
    // =============================================
    function setLanguage(lang, btn) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        const t = translations[lang];
        document.getElementById('searchInput').placeholder     = t.searchPlaceholder;
        document.getElementById('txt-cat-title').innerText     = t.catTitle;
        document.getElementById('txt-catalog-title').innerText = t.catalogTitle;
        document.getElementById('txt-float-cart').innerText    = t.floatCart;
        document.getElementById('txt-modal-title').innerText   = t.modalTitle;
        document.getElementById('lbl-biz-name').innerText      = t.lblBizName;
        document.getElementById('lbl-biz-addr').innerText      = t.lblBizAddr;
        document.getElementById('txt-btn-send').innerText      = t.btnSend;
        document.getElementById('cat-all').innerText           = t.catAll;
        document.getElementById('cat-matcha').innerText        = t.catMatcha;
        document.getElementById('cat-syrup').innerText         = t.catSyrup;
        document.getElementById('cat-sauce').innerText         = t.catSauce;
        document.getElementById('cat-dairy').innerText         = t.catDairy;
        document.getElementById('cat-food').innerText          = t.catFood;
        document.getElementById('cat-beverage').innerText      = t.catBeverage;
        document.getElementById('txt-notif-title').innerText   = t.notifTitle;
        document.getElementById('txt-notif-markall').innerText = t.notifMarkAll;
        renderPage();
        renderNotifications();
    }

    // =============================================
    //  LOAD PRODUCTS
    // =============================================
    async function loadProducts() {
        showSkeletons();
        try {
            const response = await fetch('products.json');
            if (!response.ok) throw new Error("products.json not found");
            const data = await response.json();
            allProducts     = data.products || data;
            currentProducts = allProducts;
            currentPage     = 1;
            renderPage();
        } catch (error) {
            console.error("Error loading products:", error);
            document.getElementById('product-list').innerHTML =
                `<p style='grid-column:1/-1;padding:40px;color:#d32f2f;text-align:center;'>Error loading products.json</p>`;
        }
    }

    function showSkeletons() {
        const list = document.getElementById('product-list');
        let html = '';
        for (let i = 0; i < 6; i++) {
            html += `<div class="skeleton-card">
                <div class="skeleton-img"></div>
                <div class="skeleton-text">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>`;
        }
        list.innerHTML = html;
        document.getElementById('pagination').innerHTML = '';
    }

    // =============================================
    //  RENDER — PAGINATED
    // =============================================
    function renderPage() {
        const list = document.getElementById('product-list');
        const t    = translations[currentLang];

        if (!currentProducts || currentProducts.length === 0) {
            list.innerHTML = `<div class="empty-state">
                <i class="fa-solid fa-box-open"></i>
                <p>${t.noProducts}</p>
            </div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(currentProducts.length / PAGE_SIZE);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const start       = (currentPage - 1) * PAGE_SIZE;
        const end         = Math.min(start + PAGE_SIZE, currentProducts.length);
        const pageProducts = currentProducts.slice(start, end);

        const fragment = document.createDocumentFragment();
        pageProducts.forEach(p => {
            const card = createProductCard(p);
            fragment.appendChild(card);
        });

        list.innerHTML = '';
        list.appendChild(fragment);

        // FIX 1: hanya scroll saat user pindah halaman, bukan saat load awal
        if (!isInitialLoad) {
            list.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        isInitialLoad = false;

        renderPagination(totalPages);
    }

    // =============================================
    //  CREATE PRODUCT CARD
    // =============================================
    function createProductCard(p) {
        const isAdded  = cart[p.name] !== undefined;
        const itemCode = p.code ? `${p.code} - ` : '';

        const card = document.createElement('div');
        card.className = 'product-card';
        card.addEventListener('click', () => showProductDetail(p));

        const img = document.createElement('img');
        img.className   = 'product-img';
        img.alt         = p.name;
        img.loading     = 'lazy';
        img.decoding    = 'async';
        img.width       = 400;
        img.height      = 400;
        img.dataset.src = p.image;
        img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        img.addEventListener('load', () => img.classList.add('loaded'));
        img.onerror = () => {
            img.src = `https://placehold.co/400x400?text=${encodeURIComponent(p.name)}`;
            img.classList.add('loaded');
        };
        lazyObserver.observe(img);

        const info = document.createElement('div');
        info.className = 'product-info';
        info.innerHTML = `
            <span class="brand-tag">${escapeHtml(p.brand || '')}</span>
            <h4 class="product-name">${escapeHtml(itemCode + p.name)}</h4>
            <p class="price">RM ${p.price.toFixed(2)}</p>`;

        const btn = document.createElement('button');
        btn.className = 'btn-add';
        btn.disabled  = isAdded;
        btn.innerHTML = isAdded
            ? '<i class="fa-solid fa-check"></i> ' + translations[currentLang].btnAdd
            : translations[currentLang].btnAdd;
        btn.addEventListener('click', e => {
            e.stopImmediatePropagation();
            addToCart(p.name, p.price);
        });

        card.appendChild(img);
        card.appendChild(info);
        card.appendChild(btn);
        return card;
    }

    // =============================================
    //  LAZY IMAGE OBSERVER
    // =============================================
    const lazyObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                if (img.dataset.src) {
                    img.src = img.dataset.src;
                    delete img.dataset.src;
                }
                lazyObserver.unobserve(img);
            }
        });
    }, { rootMargin: '200px' });

    // =============================================
    //  PAGINATION
    // =============================================
    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        if (totalPages <= 1) { container.innerHTML = ''; return; }

        const pages = getPaginationRange(currentPage, totalPages);
        let html = '';
        html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
            <i class="fa-solid fa-chevron-left"></i></button>`;
        pages.forEach(p => {
            if (p === '...') {
                html += `<span class="page-ellipsis">…</span>`;
            } else {
                html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
            }
        });
        html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
            <i class="fa-solid fa-chevron-right"></i></button>`;
        container.innerHTML = html;
    }

    function getPaginationRange(current, total) {
        if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
        const range = [];
        const delta = 1;
        const left  = Math.max(2, current - delta);
        const right = Math.min(total - 1, current + delta);
        range.push(1);
        if (left > 2) range.push('...');
        for (let i = left; i <= right; i++) range.push(i);
        if (right < total - 1) range.push('...');
        range.push(total);
        return range;
    }

    function goToPage(page) {
        const totalPages = Math.ceil(currentProducts.length / PAGE_SIZE);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderPage();
    }

    // =============================================
    //  FILTER & SEARCH
    // =============================================
    let searchDebounceTimer = null;

    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(applyFilters, 280);
    });

    document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { clearTimeout(searchDebounceTimer); applyFilters(); }
    });

    function triggerSearch() {
        clearTimeout(searchDebounceTimer);
        applyFilters();
    }

    let activeCategory = 'All';

    function filterByCategory(category, element) {
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        activeCategory = category;
        applyFilters();
    }

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        let filtered = activeCategory === 'All'
            ? allProducts
            : allProducts.filter(p => p.category === activeCategory);
        if (q) {
            filtered = filtered.filter(p =>
                p.name.toLowerCase().includes(q) ||
                (p.brand && p.brand.toLowerCase().includes(q)) ||
                (p.code && p.code.toLowerCase().includes(q))
            );
        }
        currentProducts = filtered;
        currentPage = 1;
        renderPage();
    }

    // =============================================
    //  CART
    // =============================================
    function addToCart(name, price) {
        if (!cart[name]) {
            cart[name] = { price, qty: 1 };
            updateBadge();
            updateCardButtons(name, true);
        }
    }

    function changeQty(name, amount) {
        if (cart[name]) {
            cart[name].qty += amount;
            if (cart[name].qty <= 0) {
                delete cart[name];
                updateCardButtons(name, false);
            }
            updateBadge();
            renderCart();
            if (Object.keys(cart).length === 0) toggleModal();
        }
    }

    function updateCardButtons(name, added) {
        document.querySelectorAll('.product-card').forEach(card => {
            const nameEl = card.querySelector('.product-name');
            if (!nameEl) return;
            if (!nameEl.innerText.includes(name)) return;
            const btn = card.querySelector('.btn-add');
            if (!btn) return;
            btn.disabled = added;
            btn.innerHTML = added
                ? `<i class="fa-solid fa-check"></i> ${translations[currentLang].btnAdd}`
                : translations[currentLang].btnAdd;
        });
    }

    function updateBadge() {
        const total = Object.keys(cart).length;
        document.getElementById('cart-count').innerText  = total;
        document.getElementById('float-count').innerText = total;
    }

    function renderCart() {
        const summary = document.getElementById('cart-summary');
        const t = translations[currentLang];
        let html = '';
        let grandTotal = 0;

        for (let item in cart) {
            const sub = cart[item].price * cart[item].qty;
            grandTotal += sub;
            const safeItem = item.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            html += `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #eee;">
                <div style="flex:1;">
                    <div style="font-weight:600;">${escapeHtml(item)}</div>
                    <div style="color:#777;font-size:13px;">RM ${cart[item].price.toFixed(2)}</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <button onclick="changeQty('${safeItem}',-1)" style="width:30px;height:30px;border:none;background:var(--primary-color);color:white;border-radius:6px;cursor:pointer;">−</button>
                    <span style="font-weight:bold;min-width:24px;text-align:center;">${cart[item].qty}</span>
                    <button onclick="changeQty('${safeItem}',1)" style="width:30px;height:30px;border:none;background:var(--primary-color);color:white;border-radius:6px;cursor:pointer;">+</button>
                </div>
                <div style="font-weight:bold;width:85px;text-align:right;">RM ${sub.toFixed(2)}</div>
            </div>`;
        }

        html += `
        <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:17px;color:var(--price-color);margin-top:15px;padding-top:10px;border-top:2px solid #eee;">
            <span>${t.estTotal}</span>
            <span>RM ${grandTotal.toFixed(2)}</span>
        </div>`;

        summary.innerHTML = html || `<p style="text-align:center;color:#888;padding:30px 0;">${t.emptyCart}</p>`;
    }

    function toggleModal() {
        const modal = document.getElementById('modal');
        const t = translations[currentLang];
        if (Object.keys(cart).length === 0 && modal.style.display !== 'flex') {
            alert(t.emptyCart);
            return;
        }
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        if (modal.style.display === 'flex') renderCart();
    }

    // =============================================
    //  PRODUCT DETAIL POPUP
    // =============================================
    function showProductDetail(product) {
        currentViewedProduct = product;
        const modal   = document.getElementById('productModal');
        const content = document.getElementById('modalProductContent');
        const itemCode = product.code ? `${product.code} - ` : '';

        content.innerHTML = `
            <img src="${product.image}" class="modal-image"
                 onerror="this.src='https://placehold.co/600x600?text=${encodeURIComponent(product.name)}'">
            <div class="modal-info">
                <div class="modal-brand">${escapeHtml(product.brand || '')}</div>
                <div class="modal-name">${escapeHtml(itemCode + product.name)}</div>
                <div class="modal-price">RM ${product.price.toFixed(2)}</div>
                <button class="btn-add" style="width:100%;padding:14px;border-radius:8px;"
                        ${cart[product.name] ? 'disabled' : ''}
                        onclick="addToCartFromPopup(); event.stopImmediatePropagation();">
                    ${cart[product.name]
                        ? '<i class="fa-solid fa-check"></i> Added to Cart'
                        : translations[currentLang].btnAdd}
                </button>
            </div>`;
        modal.style.display = 'flex';
    }

    function closeProductModal() {
        document.getElementById('productModal').style.display = 'none';
    }

    function addToCartFromPopup() {
        if (currentViewedProduct) {
            addToCart(currentViewedProduct.name, currentViewedProduct.price);
            showProductDetail(currentViewedProduct);
        }
    }

    // =============================================
    //  WHATSAPP SEND
    // =============================================
    function sendToWA(e) {
        e.preventDefault();
        const t = translations[currentLang];
        let msg = `*${t.waHeader}*\n\n`;
        msg += `*${t.waBiz}:* ${document.getElementById('bizName').value}\n`;
        msg += `*${t.waAddr}:* ${document.getElementById('bizAddress').value}\n\n`;
        msg += `*${t.waList}:*\n`;
        let total = 0;
        for (let itemName in cart) {
            const productData = allProducts.find(p => p.name === itemName);
            const itemCode = productData && productData.code ? `[${productData.code}] ` : '';
            msg += `- ${cart[itemName].qty}x ${itemCode}${itemName}\n`;
            total += cart[itemName].price * cart[itemName].qty;
        }
        msg += `\n_MOQ (Minimum Order Quantity) :_`;
        window.open(`https://wa.me/601115008803?text=${encodeURIComponent(msg)}`, '_blank');
    }

    // =============================================
    //  NOTIFICATIONS
    // =============================================
    async function loadNotifications() {
        try {
            const res = await fetch('notifications.json');
            if (!res.ok) throw new Error('notifications.json not found');
            const data = await res.json();
            notifications = (data.notifications || data).map(n => ({ ...n, read: false }));
            renderNotifications();
        } catch (err) {
            console.error('Error loading notifications:', err);
        }
    }

    function renderNotifications() {
        const list  = document.getElementById('notif-list');
        const badge = document.getElementById('notif-badge');
        const t     = translations[currentLang];
        const unreadCount = notifications.filter(n => !n.read).length;

        badge.textContent = unreadCount;
        badge.style.display = unreadCount > 0 ? 'inline' : 'none';

        if (notifications.length === 0) {
            list.innerHTML = `<div class="notif-empty">
                <i class="fa-regular fa-bell-slash"></i>
                <p>${t.notifEmpty}</p>
            </div>`;
            return;
        }

        list.innerHTML = notifications.map((n, i) => `
            <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead(${i})">
                <div class="notif-item-inner">
                    <div class="notif-dot"></div>
                    <div>
                        <div class="notif-title">${escapeHtml(n.title || '')}</div>
                        <div class="notif-body">${escapeHtml(n.message || n.body || '')}</div>
                        <div class="notif-time">${escapeHtml(n.time || n.date || '')}</div>
                    </div>
                </div>
            </div>`).join('');
    }

    function markRead(index) {
        if (notifications[index]) {
            notifications[index].read = true;
            renderNotifications();
        }
    }

    function markAllRead() {
        notifications.forEach(n => n.read = true);
        renderNotifications();
    }

    function toggleNotifPanel() {
        const panel = document.getElementById('notifPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    // Tutup notif panel saat klik di luar
    document.addEventListener('click', function(e) {
        const wrapper = document.getElementById('notifWrapper');
        if (wrapper && !wrapper.contains(e.target)) {
            document.getElementById('notifPanel').style.display = 'none';
        }
    });

    // =============================================
    //  UTILITIES
    // =============================================
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    document.getElementById('productModal').addEventListener('click', function(e) {
        if (e.target === this) closeProductModal();
    });

    // =============================================
    //  INIT
    // =============================================
    window.onload = () => {
        setLanguage('en');
        loadProducts();
        loadNotifications();
    };
    </script>
</body>
</html>
