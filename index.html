<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleso Pacific | B2B F&B Supplier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4a017;
            --accent-color: #1a1a1a;
            --bg-light: #f9f9f9;
            --text-dark: #2d2d2d;
            --white: #ffffff;
            --price-color: #b8860b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 90px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px;
        }
        .lang-bar {
            background: #d4a017;
            padding: 6px 0;
            text-align: right;
        }
        .lang-btn {
            background: none;
            border: none;
            color: #fff;
            opacity: 0.8;
            cursor: pointer;
            font-size: 12.5px;
            margin-left: 16px;
            font-weight: 600;
        }
        .lang-btn.active {
            opacity: 1;
            color: var(--accent-color);
            font-weight: 700;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo img {
            height: 42px;
            width: auto;
        }
        .logo-text {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .cart-wrapper {
            position: relative;
            font-size: 26px;
            padding: 8px;
            cursor: pointer;
        }
        .cart-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--accent-color);
            color: var(--primary-color);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 50%;
            min-width: 18px;
            text-align: center;
        }
        .search-box {
            display: flex;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            min-height: 52px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
        }
        .search-box button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 22px;
            cursor: pointer;
            font-size: 20px;
        }

        /* Product Card */
        .section-white {
            background: white;
            margin-top: 12px;
            padding: 16px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section-title {
            font-size: 14px;
            color: #555;
            margin-bottom: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .cat-item {
            background: white;
            padding: 14px 8px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid #eee;
            transition: 0.2s;
        }
        .cat-item:hover {
            border-color: var(--primary-color);
        }
        .cat-item i {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 6px;
        }
        .cat-item p {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }
        .cat-item.active {
            background: #fff9e6;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: 0.25s;
            cursor: pointer;
        }
        .product-card:hover {
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f5f5f5;
        }
        .product-info {
            padding: 12px;
        }
        .brand-tag {
            font-size: 10px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .product-name {
            font-size: 13.8px;
            font-weight: 600;
            line-height: 1.35;
            height: 38px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin: 6px 0 8px;
        }
        .price {
            color: var(--price-color);
            font-weight: 700;
            font-size: 15.5px;
            margin-bottom: 10px;
        }
        .btn-add {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-add:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* PRODUCT DETAIL MODAL (Popup Mengambang) */
        .product-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 4000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-image {
            width: 100%;
            height: 320px;
            object-fit: contain;
            background: #f9f9f9;
        }
        .modal-info {
            padding: 20px;
        }
        .modal-brand {
            font-size: 12px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .modal-name {
            font-size: 18px;
            font-weight: 600;
            margin: 8px 0 12px;
            line-height: 1.3;
        }
        .modal-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--price-color);
            margin-bottom: 20px;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 4100;
        }

        .floating-cart {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-color);
            color: var(--primary-color);
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14.5px;
            cursor: pointer;
        }
        .float-badge {
            background: var(--primary-color);
            color: white;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 12px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-content-cart {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-wa {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="lang-bar">
        <div class="container">
            <button class="lang-btn active" onclick="setLanguage('en', this)">English</button>
            <button class="lang-btn" onclick="setLanguage('ms', this)">Melayu</button>
            <button class="lang-btn" onclick="setLanguage('zh', this)">中文</button>
        </div>
    </div>

    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <img src="SalesoLogo.png" alt="Saleso Pacific Logo">
                    <div class="logo-text">SALESO PASIFIC</div>
                </div>
                <div class="cart-wrapper" onclick="toggleModal()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" onkeyup="filterBySearch()" placeholder="Search from 700+ F&B ingredients...">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="section-white">
            <div class="section-title" id="txt-cat-title">Main Category</div>
            <div class="category-grid">
                <div class="cat-item active" onclick="filterByCategory('All', this)">
                    <i class="fa-solid fa-border-all"></i>
                    <p id="cat-all">All</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Matcha', this)">
                    <i class="fa-solid fa-leaf"></i>
                    <p id="cat-matcha">Matcha</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Beverage', this)">
                    <i class="fa-solid fa-glass-water"></i>
                    <p id="cat-beverage">Beverage</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Syrup', this)">
                    <i class="fa-solid fa-bottle-droplet"></i>
                    <p id="cat-syrup">Syrup</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Sauce', this)">
                    <i class="fa-solid fa-fill-drip"></i>
                    <p id="cat-sauce">Sauce</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Dairy', this)">
                    <i class="fa-solid fa-cow"></i>
                    <p id="cat-dairy">Dairy</p>
                </div>
                <div class="cat-item" onclick="filterByCategory('Food', this)">
                    <i class="fa-solid fa-utensils"></i>
                    <p id="cat-food">Food</p>
                </div>
            </div>
        </section>

        <h2 class="section-title" id="txt-catalog-title" style="margin-top: 24px;">Product Catalog</h2>
        <div class="product-grid" id="product-list"></div>
    </main>

    <!-- PRODUCT DETAIL MODAL -->
    <div class="product-modal" id="productModal">
        <div style="position:relative; width:100%; max-width:420px;">
            <div class="modal-close" onclick="closeProductModal()">×</div>
            <div class="modal-content" id="modalContent">
                <!-- Isi diisi via JavaScript -->
            </div>
        </div>
    </div>

    <!-- Floating Cart -->
    <button class="floating-cart" id="floatingCart" onclick="toggleModal()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="txt-float-cart">View Cart</span>
        <span class="float-badge" id="float-count">0</span>
    </button>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content-cart">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="txt-modal-title">Order Summary</h3>
                <i class="fa-solid fa-xmark" style="font-size:26px; cursor:pointer; color:#888;" onclick="toggleModal()"></i>
            </div>
            <div id="cart-summary" style="margin-bottom: 25px; max-height: 320px; overflow-y: auto;"></div>
            <form onsubmit="sendToWA(event)">
                <div class="form-group">
                    <label id="lbl-biz-name">Business Name / Shop</label>
                    <input type="text" id="bizName" required>
                </div>
                <div class="form-group">
                    <label id="lbl-biz-addr">Delivery Address</label>
                    <textarea id="bizAddress" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-wa">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span id="txt-btn-send">Send via WhatsApp</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const translations = { /* ... tetap sama seperti sebelumnya ... */ 
            en: { /* isi sama */ },
            ms: { /* isi sama */ },
            zh: { /* isi sama */ }
        };

        let currentLang = 'en';
        let allProducts = [];
        let currentProducts = [];
        let cart = {};
        let currentProduct = null;   // Untuk menyimpan produk yang sedang dilihat di popup

        // ================== SET LANGUAGE ==================
        function setLanguage(lang, btn) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            document.getElementById('searchInput').placeholder = translations[lang].searchPlaceholder;
            document.getElementById('txt-cat-title').innerText = translations[lang].catTitle;
            document.getElementById('txt-catalog-title').innerText = translations[lang].catalogTitle;
            document.getElementById('txt-float-cart').innerText = translations[lang].floatCart;
            document.getElementById('txt-modal-title').innerText = translations[lang].modalTitle;
            document.getElementById('lbl-biz-name').innerText = translations[lang].lblBizName;
            document.getElementById('lbl-biz-addr').innerText = translations[lang].lblBizAddr;
            document.getElementById('txt-btn-send').innerText = translations[lang].btnSend;

            document.getElementById('cat-all').innerText = translations[lang].catAll;
            document.getElementById('cat-matcha').innerText = translations[lang].catMatcha;
            document.getElementById('cat-syrup').innerText = translations[lang].catSyrup;
            document.getElementById('cat-sauce').innerText = translations[lang].catSauce;
            document.getElementById('cat-dairy').innerText = translations[lang].catDairy;
            document.getElementById('cat-food').innerText = translations[lang].catFood;
            document.getElementById('cat-beverage').innerText = translations[lang].catBeverage;

            displayProducts(currentProducts);
        }

        // ================== LOAD PRODUCTS ==================
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                if (!response.ok) throw new Error("products.json not found");
                const data = await response.json();
                allProducts = data.products || data;
                currentProducts = allProducts;
                displayProducts(currentProducts);
            } catch (error) {
                console.error("Error loading products:", error);
                document.getElementById('product-list').innerHTML = `<p style='padding:40px; color:#d32f2f; text-align:center;'>Error loading products.json</p>`;
            }
        }

        // ================== DISPLAY PRODUCTS ==================
        function displayProducts(products) {
            const list = document.getElementById('product-list');
            if (!products || products.length === 0) {
                list.innerHTML = "<p style='padding:30px; text-align:center; color:#666;'>No products found.</p>";
                return;
            }
            list.innerHTML = products.map(p => {
                const isAdded = cart[p.name] !== undefined;
                const itemCode = p.code ? `${p.code} - ` : "";
                return `
                <div class="product-card" onclick="showProductDetail(${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    <img src="${p.image}" class="product-img" loading="lazy" decoding="async" width="400" height="400" onerror="this.src='https://placehold.co/400x400?text=${encodeURIComponent(p.name)}'">
                    <div class="product-info">
                        <span class="brand-tag">${p.brand || ''}</span>
                        <h4 class="product-name">${itemCode}${p.name}</h4>
                        <p class="price">RM ${p.price.toFixed(2)}</p>
                    </div>
                </div>`;
            }).join('');
        }

        // ================== SHOW PRODUCT DETAIL POPUP ==================
        function showProductDetail(product) {
            currentProduct = product;
            const modal = document.getElementById('productModal');
            const content = document.getElementById('modalContent');

            const itemCode = product.code ? `${product.code} - ` : "";

            content.innerHTML = `
                <img src="${product.image}" class="modal-image" onerror="this.src='https://placehold.co/600x600?text=${encodeURIComponent(product.name)}'">
                <div class="modal-info">
                    <div class="modal-brand">${product.brand || ''}</div>
                    <div class="modal-name">${itemCode}${product.name}</div>
                    <div class="modal-price">RM ${product.price.toFixed(2)}</div>
                    <button class="btn-add" ${cart[product.name] ? 'disabled' : ''} onclick="addToCartFromModal(); event.stopImmediatePropagation();">
                        ${cart[product.name] ? '<i class="fa-solid fa-check"></i> Added' : translations[currentLang].btnAdd}
                    </button>
                </div>
            `;

            modal.style.display = 'flex';
        }

        function closeProductModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        // Add to cart dari modal
        function addToCartFromModal() {
            if (currentProduct) {
                addToCart(currentProduct.name, currentProduct.price);
                // Refresh modal button
                showProductDetail(currentProduct);
            }
        }

        // ================== ADD TO CART ==================
        function addToCart(name, price) {
            if (!cart[name]) {
                cart[name] = { price, qty: 1 };
                updateBadge();
                displayProducts(currentProducts);   // refresh tombol add
            }
        }

        function changeQty(name, amount) {
            if (cart[name]) {
                cart[name].qty += amount;
                if (cart[name].qty <= 0) delete cart[name];
                updateBadge();
                renderCart();
                displayProducts(currentProducts);
                if (Object.keys(cart).length === 0) toggleModal();
            }
        }

        function updateBadge() {
            const total = Object.keys(cart).length;
            document.getElementById('cart-count').innerText = total;
            document.getElementById('float-count').innerText = total;
            document.getElementById('floatingCart').classList.toggle('show', total > 0);
        }

        function renderCart() {
            const summary = document.getElementById('cart-summary');
            let html = "";
            let grandTotal = 0;
            for (let item in cart) {
                let sub = cart[item].price * cart[item].qty;
                grandTotal += sub;
                html += `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid #eee;">
                    <div style="flex:1;">
                        <div style="font-weight:600;">${item}</div>
                        <div style="color:#777; font-size:13px;">RM ${cart[item].price.toFixed(2)}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button onclick="changeQty('${item.replace(/'/g, "\\'")}', -1)" style="width:30px;height:30px;border:none;background:var(--primary-color);color:white;border-radius:6px;">−</button>
                        <span style="font-weight:bold; min-width:24px; text-align:center;">${cart[item].qty}</span>
                        <button onclick="changeQty('${item.replace(/'/g, "\\'")}', 1)" style="width:30px;height:30px;border:none;background:var(--primary-color);color:white;border-radius:6px;">+</button>
                    </div>
                    <div style="font-weight:bold; width:85px; text-align:right;">RM ${sub.toFixed(2)}</div>
                </div>`;
            }
            html += `
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:17px; color:var(--price-color); margin-top:15px; padding-top:10px; border-top:2px solid #eee;">
                <span>${translations[currentLang].estTotal}</span>
                <span>RM ${grandTotal.toFixed(2)}</span>
            </div>`;
            summary.innerHTML = html || `<p style="text-align:center; color:#888; padding:30px 0;">${translations[currentLang].emptyCart}</p>`;
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            if (Object.keys(cart).length === 0 && modal.style.display !== 'flex') {
                alert(translations[currentLang].emptyCart);
                return;
            }
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
            if (modal.style.display === 'flex') renderCart();
        }

        function sendToWA(e) {
            e.preventDefault();
            const t = translations[currentLang];
            let msg = `*${t.waHeader}*\n\n`;
            msg += `*${t.waBiz}:* ${document.getElementById('bizName').value}\n`;
            msg += `*${t.waAddr}:* ${document.getElementById('bizAddress').value}\n\n`;
            msg += `*${t.waList}:*\n`;
            let total = 0;
            for (let itemName in cart) {
                const productData = allProducts.find(p => p.name === itemName);
                const itemCode = productData && productData.code ? `[${productData.code}] ` : "";
                msg += `- ${cart[itemName].qty}x ${itemCode}${itemName}\n`;
                total += cart[itemName].price * cart[itemName].qty;
            }
            msg += `\nTotal : RM ${total.toFixed(2)}\n`;
            msg += `\n_MOQ (Minimum Order Quantity) :_`;
            window.open(`https://wa.me/601115008803?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Close modal when clicking outside the content
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProductModal();
            }
        });

        // Initialize
        window.onload = () => {
            loadProducts();
            setLanguage('en');
        };
    </script>
</body>
</html>
